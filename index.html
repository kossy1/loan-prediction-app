<!DOCTYPE html>
<html>
<head>
    <title>Loan Approval Predictor</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, select { width: 100%; padding: 8px; margin: 5px 0 15px; }
        button { background: #0070f3; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .approved { background: #d4edda; border: 1px solid #c3e6cb; }
        .rejected { background: #f8d7da; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>🏦 Loan Approval Predictor</h1>
    <form id="loanForm">
        <label>Age:</label>
        <input type="number" id="age" value="35" required>
        
        <label>Income ($):</label>
        <input type="number" id="income" value="60000" required>
        
        <label>Credit Score:</label>
        <input type="number" id="credit_score" value="720" required>
        
        <label>Employment Years:</label>
        <input type="number" id="employment_years" value="8" required>
        
        <label>Debt Ratio:</label>
        <input type="number" id="debt_ratio" value="0.35" step="0.01" required>
        
        <label>Loan Amount ($):</label>
        <input type="number" id="loan_amount" value="150000" required>
        
        <label>Interest Rate:</label>
        <input type="number" id="interest_rate" value="4.5" step="0.1" required>
        
        <label>Dependents:</label>
        <input type="number" id="dependents" value="2" required>
        
        <label>Education Level (1-5):</label>
        <input type="number" id="education_level" value="4" min="1" max="5" required>
        
        <label>Employment Type (1-4):</label>
        <input type="number" id="employment_type" value="2" min="1" max="4" required>
        
        <button type="submit">Predict Loan Approval</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('loanForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const data = {
                age: parseInt(document.getElementById('age').value),
                income: parseFloat(document.getElementById('income').value),
                credit_score: parseInt(document.getElementById('credit_score').value),
                employment_years: parseFloat(document.getElementById('employment_years').value),
                debt_ratio: parseFloat(document.getElementById('debt_ratio').value),
                loan_amount: parseFloat(document.getElementById('loan_amount').value),
                interest_rate: parseFloat(document.getElementById('interest_rate').value),
                dependents: parseInt(document.getElementById('dependents').value),
                education_level: parseInt(document.getElementById('education_level').value),
                employment_type: parseInt(document.getElementById('employment_type').value)
            };
            
            try {
                const response = await fetch('https://loan-approval-pnim15q48-kossyvibes-7750s-projects.vercel.app/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('result');
                
                resultDiv.className = `result ${result.status === 'Approved' ? 'approved' : 'rejected'}`;
                resultDiv.innerHTML = `
                    <h2>${result.status}</h2>
                    <p><strong>Probability:</strong> ${(result.probability * 100).toFixed(1)}%</p>
                    <p><strong>Confidence:</strong> ${(result.confidence * 100).toFixed(1)}%</p>
                    <p><strong>Model:</strong> ${result.model_used}</p>
                    <p><strong>Timestamp:</strong> ${new Date(result.timestamp).toLocaleString()}</p>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<p style="color:red;">Error: ${error.message}</p>`;
            }
        };
    </script>
</body>
</html>
